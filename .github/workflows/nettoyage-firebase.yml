name: Nettoyage historique Firebase

# Roule tous les jours à 8h00 UTC (= 4h00 du matin, heure de Québec en été / 3h00 en hiver)
# Peut aussi être déclenché manuellement depuis l'onglet "Actions" de GitHub
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  nettoyage:
    runs-on: windows-latest
    steps:
      - name: Nettoyer l'historique Firebase (> 14 jours)
        shell: pwsh
        env:
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: |
          ./Clear-AncienHistorique.ps1 -JoursRetention 14
